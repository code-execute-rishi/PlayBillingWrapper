name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + Test + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Library — unit tests
        run: ./gradlew :library:testReleaseUnitTest --no-daemon --stacktrace

      - name: Library — lint
        run: ./gradlew :library:lintRelease --no-daemon --stacktrace
        continue-on-error: false

      - name: Library — assemble release AAR
        run: ./gradlew :library:assembleRelease --no-daemon --stacktrace

      - name: Sample app — assemble debug APK
        run: ./gradlew :sample:assembleDebug --no-daemon --stacktrace

      - name: Upload library AAR
        uses: actions/upload-artifact@v4
        with:
          name: library-aar
          path: library/build/outputs/aar/*.aar
          if-no-files-found: error

      - name: Upload sample APK
        uses: actions/upload-artifact@v4
        with:
          name: sample-debug-apk
          path: sample/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: library/build/reports/lint-results-*.html
          if-no-files-found: ignore
