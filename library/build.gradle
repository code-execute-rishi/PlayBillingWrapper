plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    namespace 'com.playbillingwrapper'
    compileSdk 36

    defaultConfig {
        minSdk 23
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    publishing {
        singleVariant("release") {
            withSourcesJar()
            withJavadocJar()
        }
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
            returnDefaultValues = true
        }
    }

    lint {
        targetSdk 36
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.github.code-execute-rishi'
                artifactId = 'PlayBillingWrapper'
                version = '0.1.1'
            }
        }
    }
}

dependencies {
    // Types from these libs are exposed on the public surface (BillingResult, ProductDetails,
    // Purchase, Lifecycle, @NonNull / @Nullable), so they must be `api` to stay on the
    // consumer's compile classpath.
    api 'androidx.annotation:annotation:1.9.1'
    api 'androidx.lifecycle:lifecycle-common:2.8.7'
    api 'com.android.billingclient:billing:8.3.0'

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.14.2'
    testImplementation 'org.mockito:mockito-inline:5.2.0'
    testImplementation 'org.robolectric:robolectric:4.14.1'
    testImplementation 'androidx.test:core:1.6.1'
}
